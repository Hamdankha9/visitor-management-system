<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Visitor Management System</h1>
        </header>

        <main>
            <section class="form-section">
                <h2>Register Visitor</h2>
                <form id="visitorForm">
                    <div class="form-group">
                        <label for="visitorName">Full Name:</label>
                        <input type="text" id="visitorName" name="visitorName" required>
                    </div>

                    <div class="form-group">
                        <label for="visitorEmail">Email:</label>
                        <input type="email" id="visitorEmail" name="visitorEmail" required>
                    </div>

                    <div class="form-group">
                        <label for="visitorPhone">Phone:</label>
                        <input type="tel" id="visitorPhone" name="visitorPhone" required>
                    </div>

                    <div class="form-group">
                        <label for="visitReason">Reason for Visit:</label>
                        <input type="text" id="visitReason" name="visitReason" required>
                    </div>

                    <div class="form-group">
                        <label for="visitDate">Visit Date:</label>
                        <input type="date" id="visitDate" name="visitDate" required>
                    </div>

                    <button type="submit" class="btn">Check In</button>
                </form>
            </section>

            <section class="visitors-section">
                <h2>Visitors List</h2>
                <table id="visitorsTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Reason</th>
                            <th>Check-in Time</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Visitor Management System. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
